# =============================================================================
# Dayglance 配置文件示例
# 使用说明：复制此文件并重命名为 `config.yml`，然后根据实际环境修改对应的值。
# =============================================================================

core:
  # 【必填】访问令牌。用于所有的 HTTP 请求验证（如 /today?token=xxx）。
  # 请务必修改为一个复杂且难以猜测的随机字符串。
  accessToken: "replace-with-a-long-random-token"
  
  # 【必填】服务运行的默认时区。用于正确解析 ICS 日程的时间。
  # 国内用户通常保持 Asia/Shanghai 即可。
  timezone: "Asia/Shanghai"

server:
  # 绑定的主机地址。
  # - 127.0.0.1: 仅允许本机访问（推荐在使用 Nginx 等反向代理时使用）。
  # - 0.0.0.0:   允许外部网络直接访问。
  host: "127.0.0.1"
  
  # 服务监听的端口号。
  port: 8100

sync:
  # 【可选】日历缓存刷新间隔（单位：秒）。默认 900 秒（15分钟）。
  refreshIntervalSeconds: 900
  
  # 【可选】获取远程日历文件的超时时间（单位：秒）。
  requestTimeoutSeconds: 20
  
  # 【可选】每天最多解析和显示的日程数量上限。
  maxEventsPerDay: 80

# -----------------------------------------------------------------------------
# 日历源配置
# -----------------------------------------------------------------------------
# calendars 下级的每一个键（如 main, work）就是日历的专属 ID。
# 在使用时，可以通过 `/today?token=xxx&cal=main` 来专门显示该日历。
calendars:
  main:
    url: "https://example.com/main.ics"
    # name: "生活主日历"   # 可选：如果你不填，系统会自动从日历源中读取
    # color: "#2563eb"     # 可选：自定义渲染颜色
    
  work:
    url: "https://example.com/work.ics"
    # name: "工作日程"
    # color: "#dc2626"

# -----------------------------------------------------------------------------
# 天气服务组件
# -----------------------------------------------------------------------------
weather:
  # 【可选】启用的天气服务提供商。目前仅支持高德地图 (amap)。
  # 如果不需要天气功能，可以将 provider 注释掉或留空。
  # provider: "amap"
  
  # 【可选】高德开放平台 Web 服务 API Key。
  # apiKey: "your_amap_key_here"
  
  # 【可选】高德城市编码 (adcode)。查找地址：https://lbs.amap.com/api/webservice/download
  # location: "320500"
